<svg viewBox="0 0 128 130" width="128" height="130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
    <linearGradient id="grad-M" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#378ADD"/>
      <stop offset="100%" stop-color="#85B7EB"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="8" y="8" width="112" height="112" rx="20"/>
    </clipPath>
    <clipPath id="clip-preview">
      <rect x="70" y="8" width="50" height="112" rx="0"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <rect x="8" y="8" width="112" height="112" rx="20" stroke-width="1" style="fill:rgb(20, 23, 30);stroke:rgb(34, 40, 54);color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <g clip-path="url(#clip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

    <!-- LEFT: source column -->
    <g font-family="'JetBrains Mono','Fira Mono','Menlo',monospace" font-size="10.5" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Mono&quot;, &quot;Menlo&quot;, monospace;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <text x="12" y="44" style="fill:rgb(239, 159, 39);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Mono&quot;, &quot;Menlo&quot;, monospace;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">```md</text>
      <text x="12" y="60" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Mono&quot;, &quot;Menlo&quot;, monospace;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">
        <tspan font-weight="700" style="fill:rgb(96, 168, 240);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Mono&quot;, &quot;Menlo&quot;, monospace;font-size:10.5px;font-weight:700;text-anchor:start;dominant-baseline:auto"># </tspan><tspan font-weight="700" style="fill:rgb(232, 230, 224);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Mono&quot;, &quot;Menlo&quot;, monospace;font-size:10.5px;font-weight:700;text-anchor:start;dominant-baseline:auto">Wysee</tspan>
      </text>
      <text x="12" y="76" style="fill:rgb(239, 159, 39);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Mono&quot;, &quot;Menlo&quot;, monospace;font-size:10.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">```</text>
    </g>

    <!-- DIVIDER -->
    <rect x="67" y="12" width="1" height="104" rx="0.5" style="fill:rgb(34, 40, 54);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- RIGHT: preview pane -->
    <rect x="68" y="8" width="52" height="112" rx="0" style="fill:rgb(19, 24, 37);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Big M — blue gradient fill -->
    <g clip-path="url(#clip-preview)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <rect fill="url(#grad-M)" x="76" y="30" width="7" height="68" rx="2" style="stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <rect fill="url(#grad-M)" x="109" y="30" width="7" height="68" rx="2" style="stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <polygon fill="url(#grad-M)" points="76,30 83,30 96,55 96,67 76,40" style="stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <polygon fill="url(#grad-M)" points="116,30 109,30 96,55 96,67 116,40" style="stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </g>

  </g>
</svg>